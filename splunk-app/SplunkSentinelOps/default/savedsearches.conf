# Splunk SentinelOps Saved Searches

[SentinelOps Auth Investigation]
search = index=sentinelops sourcetype="sentinelops:auth" user="$user$" src_ip="$src_ip$" | table _time, user, src_ip, action, status, host, country | sort _time
enablesched = 0

[SentinelOps Endpoint Investigation]
search = index=sentinelops sourcetype="sentinelops:endpoint" host="$host$" | table _time, host, user, process_name, command_line, parent_process, severity | sort _time
enablesched = 0

[SentinelOps Firewall Exfiltration Investigation]
search = index=sentinelops sourcetype="sentinelops:firewall" host="$host$" | table _time, src_ip, dest_ip, dest_port, action, bytes_out, host | sort _time
enablesched = 0

[SentinelOps Web Anomaly Investigation]
search = index=sentinelops sourcetype="sentinelops:web" src_ip="$src_ip$" | table _time, src_ip, endpoint, status_code, user_agent, response_time | sort _time
enablesched = 0

[SentinelOps Full Investigation Summary]
search = index=sentinelops | stats count by sourcetype
enablesched = 0
