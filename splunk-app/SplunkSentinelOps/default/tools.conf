# Splunk MCP Tool Configurations for Splunk MCP Server Integration

[sentinelops_auth_investigation]
description = Audits authentication logs (success/failure) for a specific user and source IP to identify active brute-force or credential abuse.
savedsearch = SentinelOps Auth Investigation
parameters = user, src_ip

[sentinelops_endpoint_investigation]
description = Audits process command execution hierarchies and PowerShell script indicators on a specific host.
savedsearch = SentinelOps Endpoint Investigation
parameters = host

[sentinelops_firewall_exfiltration]
description = Audits firewall traffic byte egress sizes on a specific host to detect exfiltration.
savedsearch = SentinelOps Firewall Exfiltration Investigation
parameters = host, threshold_bytes

[sentinelops_web_anomaly]
description = Audits web request status codes and endpoint hit counts to locate spikes in server errors (500 errors).
savedsearch = SentinelOps Web Anomaly Investigation
parameters = src_ip

[sentinelops_full_investigation_summary]
description = Aggregates all events indexed in sentinelops by sourcetype to verify total record counts.
savedsearch = SentinelOps Full Investigation Summary
parameters = earliest, latest
